<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Valero Prompt Player</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        .wav-list { max-width: 700px; margin: auto; }
        .wav-item { display: flex; align-items: center; margin-bottom: 10px; }
        .wav-name { flex: 1; }
        audio { margin-left: 10px; }
    </style>
</head>
<body>
    <h1>WAV File Player</h1>
    <label for="hostname">Server Hostname:</label>
    <input id="hostname" type="text" value="localhost" style="width: 200px;">
    <button onclick="renderList(true)">Update</button>
    <br><br>
    <label for="language">Language:</label>
    <select id="language" onchange="renderList()">
        <option value="all">All</option>
        <option value="en-us">English (en-us)</option>
        <option value="es-us">Spanish (es-us)</option>
    </select>
    <label for="search"> Search:</label>
    <input id="search" type="text" placeholder="Type to filter..." style="width: 300px;" oninput="renderList()">
    <button onclick="exportToCSV()">Export to Excel (CSV)</button>
    <div class="wav-list" id="wavList"></div>
    <div style="text-align:center;margin-top:1em;">
        <button id="prevPageBtn" style="display:none;">Previous</button>
        <span id="pageInfo" style="margin:0 1em;"></span>
        <button id="nextPageBtn" style="display:none;">Next</button>

            "es-us/app/IVR/vl8230_nm2_01.wav",
            "es-us/app/IVR/vl8230_nm2_02.wav",
            "es-us/app/IVR/vl8230_nm3_01.wav",
            "es-us/app/IVR/vl8300_cnf_ini_04.wav",
            "es-us/app/IVR/vl8500_out_16.wav",
            "es-us/app/IVR/vl8500_out_17.wav",
            "es-us/app/IVR/vl8500_out_18.wav",
            "es-us/app/IVR/vl8500_out_19.wav",
            "es-us/app/IVR/vl8500_out_20.wav",
            "es-us/app/IVR/vl8500_out_22.wav",
            "es-us/app/IVR/vl8500_out_24.wav",
            "es-us/app/IVR/vl8500_out_25.wav",
            "es-us/app/IVR/vl8500_out_26.wav",
            "es-us/app/IVR/vl8500_out_31.wav",
            "es-us/app/IVR/vl8500_out_62.wav",
            "es-us/app/IVR/vl8500_out_63.wav",
            "es-us/app/IVR/vl8515_out_02.wav",
            "es-us/app/IVR/vl_1010_nm2_01.wav"
        ];



        // Pagination state
        let pageIndex = 0;
        const PAGE_SIZE = 500;
        let currentFiltered = [];

        function isValidHostname(hostname) {
            // Simple check: non-empty and not just whitespace
            return hostname && hostname.trim().length > 0;
        }


        function renderList(force) {
            const hostname = document.getElementById('hostname').value;
            const search = document.getElementById('search')?.value?.toLowerCase() || '';
            const language = document.getElementById('language')?.value || 'all';
            const listDiv = document.getElementById('wavList');
            const prevPageBtn = document.getElementById('prevPageBtn');
            const nextPageBtn = document.getElementById('nextPageBtn');
            const pageInfo = document.getElementById('pageInfo');
            const feedback = loadFeedback();

            // Only show list if hostname is valid and Update was clicked (force=true), or if already showing
            if (!isValidHostname(hostname)) {
                listDiv.innerHTML = '<div style="color:#888;text-align:center;">Enter a valid CVP server hostname and click Update to load prompts.</div>';
                prevPageBtn.style.display = 'none';
                nextPageBtn.style.display = 'none';
                pageInfo.textContent = '';
                pageIndex = 0;
                return;
            }

            // Filtered list
            currentFiltered = wavFiles.filter(path => {
                if (language === 'all') return true;
                if (language === 'en-us') return path.startsWith('en-us/');
                if (language === 'es-us') return path.startsWith('es-us/');
                return true;
            }).filter(path => path.toLowerCase().includes(search));

            // Reset page if new search/language/hostname or force reload
            if (force) pageIndex = 0;

            // Calculate page count
            const totalPages = Math.ceil(currentFiltered.length / PAGE_SIZE);
            if (pageIndex >= totalPages) pageIndex = Math.max(0, totalPages - 1);

            // Slice for page
            const page = currentFiltered.slice(pageIndex * PAGE_SIZE, (pageIndex + 1) * PAGE_SIZE);

            listDiv.innerHTML = '';
            if (page.length === 0) {
                listDiv.innerHTML = '<div style="color:#888;text-align:center;">No prompts found for this filter.</div>';
                prevPageBtn.style.display = 'none';
                nextPageBtn.style.display = 'none';
                pageInfo.textContent = '';
                return;
            }

            // Table header
            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';
            const thead = document.createElement('thead');
            thead.innerHTML = `<tr style="background:#eee"><th>File</th><th>Play</th><th>Pass/Fail</th><th>Comments</th></tr>`;
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            page.forEach(path => {
                const url = `http://${hostname}/${path}`;
                const tr = document.createElement('tr');
                // File name
                const tdName = document.createElement('td');
                tdName.textContent = path;
                // Audio
                const tdAudio = document.createElement('td');
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = url;
                tdAudio.appendChild(audio);
                // Pass/Fail
                const tdPassFail = document.createElement('td');
                const select = document.createElement('select');
                select.innerHTML = '<option value="">--</option><option value="pass">Pass</option><option value="fail">Fail</option>';
                select.value = feedback[path]?.result || '';
                select.onchange = function() {
                    feedback[path] = feedback[path] || {};
                    feedback[path].result = select.value;
                    saveFeedback(feedback);
                };
                tdPassFail.appendChild(select);
                // Comments
                const tdComments = document.createElement('td');
                const input = document.createElement('input');
                input.type = 'text';
                input.style.width = '200px';
                input.value = feedback[path]?.comments || '';
                input.onchange = function() {
                    feedback[path] = feedback[path] || {};
                    feedback[path].comments = input.value;
                    saveFeedback(feedback);
                };
                tdComments.appendChild(input);
                // Row
                tr.appendChild(tdName);
                tr.appendChild(tdAudio);
                tr.appendChild(tdPassFail);
                tr.appendChild(tdComments);
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            listDiv.appendChild(table);

            // Pagination controls
            prevPageBtn.style.display = pageIndex > 0 ? '' : 'none';
            nextPageBtn.style.display = (pageIndex < totalPages - 1) ? '' : 'none';
            pageInfo.textContent = `Page ${pageIndex + 1} of ${totalPages}`;
        }

        // Pagination handlers
        document.getElementById('prevPageBtn').onclick = function() {
            if (pageIndex > 0) {
                pageIndex--;
                renderList();
            }
        };
        document.getElementById('nextPageBtn').onclick = function() {
            const totalPages = Math.ceil(currentFiltered.length / PAGE_SIZE);
            if (pageIndex < totalPages - 1) {
                pageIndex++;
                renderList();
            }
        };

        // Show More handler
        document.getElementById('showMoreBtn').onclick = function() {
            batchIndex++;
            renderList();
        };

        function exportToCSV() {
            const feedback = loadFeedback();
            let csv = 'File,Result,Comments\n';
            wavFiles.forEach(path => {
                const f = feedback[path] || {};
                // Only export if there is feedback
                if (f.result || f.comments) {
                    // Escape commas and quotes
                    const safe = s => '"' + String(s||'').replace(/"/g,'""') + '"';
                    csv += [safe(path), safe(f.result), safe(f.comments)].join(',') + '\n';
                }
            });
            // Download
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'wav_feedback.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initial render (show nothing until Update is clicked)
        renderList();
    </script>
    </script>
</body>
</html>
